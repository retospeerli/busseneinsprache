<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bestreitung Umtriebsentschädigung</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<main class="wrap">

<header class="topbar">
<div class="brand">
<div class="logo"></div>
<div>
<h1>Bestreitung Umtriebsentschädigung</h1>
<p>Generator für Einsprache gegen Park-Umtriebsentschädigungen</p>
</div>
</div>
</header>


<section class="card">

<h2>Personalien</h2>

<div class="formgrid">

<label>
Vorname
<input id="firstName" type="text">
</label>

<label>
Nachname
<input id="lastName" type="text">
</label>

<label>
Adresse
<input id="address" type="text">
</label>

<label>
PLZ / Ort
<input id="city" type="text">
</label>

</div>

<hr>

<h2>Parkfall</h2>

<div class="formgrid">

<label>
Autokennzeichen
<input id="plate" type="text">
</label>

<label>
Datum
<input id="eventDate" type="text">
</label>

<label>
Uhrzeit
<input id="eventTime" type="text">
</label>

<label>
Ort / Parkplatz
<input id="location" type="text">
</label>

<label>
Lenker / Lenkerin
<input id="driverName" type="text">
</label>

</div>

<hr>

<h2>Tonalität</h2>

<div class="toneRow">

<button class="toneBtn active" data-tone="neutral">😐</button>
<button class="toneBtn" data-tone="happy">😊</button>
<button class="toneBtn" data-tone="grumpy">😑</button>

</div>

<div class="actions">

<button id="btnGenerate" class="primary">Text generieren</button>
<button id="btnCopy">Kopieren</button>
<button id="btnMail">Per Outlook senden</button>

</div>

</section>


<section class="card">

<h2>Brieftext</h2>

<textarea id="letterText"></textarea>

</section>

</main>

<script src="./app.js"></script>

</body>
</html>
