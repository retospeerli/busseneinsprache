<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Umtriebsentschädigung bestreiten</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Bestreitung Umtriebsentschädigung</h1>

<h2>Personalien</h2>

<label>Vorname</label>
<input id="firstName">

<label>Nachname</label>
<input id="lastName">

<label>Adresse</label>
<input id="address">

<label>PLZ / Ort</label>
<input id="city">

<h2>Parkereignis</h2>

<label>Kennzeichen</label>
<input id="plate">

<label>Datum</label>
<input id="eventDate">

<label>Uhrzeit</label>
<input id="eventTime">

<label>Ort / Parkplatz</label>
<input id="location">

<label>Fahrzeuglenker</label>
<input id="driverName">

<h2>Tonalität</h2>

<div class="tones">

<button class="tone active" data-tone="neutral">😐</button>
<button class="tone" data-tone="happy">😊</button>
<button class="tone" data-tone="grumpy">😑</button>

</div>

<br>

<button id="btnGenerate">Text generieren</button>
<button id="btnCopy">Kopieren</button>
<button id="btnMail">E-Mail senden</button>

<h2>Brieftext</h2>

<textarea id="letterText"></textarea>

</div>

<script src="app.js"></script>

</body>
</html>
